name: Maintain lower bounds

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  lower-pr:
    uses: tek/hix/.github/workflows/bounds.yaml@main
    with:
      command: lower.auto
    secrets:
      cachix_key: ${{ secrets.CACHIX_SIGNING_KEY }}
